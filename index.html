<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo English V2 - AI 智能拼写助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .active-item { border-left: 4px solid #3b82f6; background-color: #eff6ff; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 拼写错误样式 */
        .spell-error {
            text-decoration: underline wavy #ef4444;
            cursor: pointer;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
            transition: background-color 0.2s;
        }
        .spell-error:hover {
            background-color: #fee2e2;
        }

        .ai-loading {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        /* 模拟输入框的容器 */
        #proofreaderView {
            min-height: 8rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-40">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 text-center md:text-left">Echo English <span class="text-blue-600 text-sm font-normal">AI Spelling Pro</span></h1>
                <p class="text-slate-500 text-center md:text-left">更智能的纠错与循环学习体验</p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportToTxt()" class="text-slate-600 hover:text-blue-600 p-2 transition-colors" title="导出为TXT">
                    <i class="fas fa-file-export text-xl"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Sidebar: Playlist Management -->
            <aside class="md:col-span-1 space-y-4 order-2 md:order-1">
                <div class="bg-white rounded-2xl shadow-sm p-4 border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-slate-700">我的书架</h2>
                        <button onclick="createNewPlaylist()" class="text-blue-600 hover:text-blue-700 text-sm font-semibold">
                            <i class="fas fa-plus"></i> 新建
                        </button>
                    </div>
                    <ul id="playlistNames" class="space-y-1">
                        <!-- Playlists list injected here -->
                    </ul>
                </div>

                <div class="bg-indigo-600 rounded-2xl p-6 text-white shadow-lg shadow-indigo-200 hidden md:block">
                    <h3 class="font-bold mb-2 flex items-center gap-2">
                        <i class="fas fa-info-circle"></i> 功能提示
                    </h3>
                    <p class="text-sm opacity-90 leading-relaxed">
                        在上方输入文本后，点击<b>“AI 拼写校对”</b>。AI 会在文字下标记红色波浪线，点击即可选择修正建议。
                    </p>
                </div>
            </aside>

            <!-- Main: Content Management -->
            <main class="md:col-span-2 space-y-6 order-1 md:order-2">
                <!-- Input Area with Spell Check -->
                <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 gap-2">
                        <label class="block text-sm font-semibold text-slate-700">输入内容到 [<span id="targetListName" class="text-blue-600">默认列表</span>]</label>
                        <button id="aiInputCheckBtn" onclick="runInputSpellingCheck()" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 flex items-center gap-1 transition-colors bg-indigo-50 px-3 py-1 rounded-full border border-indigo-100">
                            <i class="fas fa-magic"></i> AI 拼写校对
                        </button>
                    </div>
                    
                    <textarea id="rawInput" 
                        class="w-full h-32 p-4 border border-slate-100 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none block"
                        placeholder="在此输入单词或句子..."></textarea>
                    
                    <div id="proofreaderView" class="w-full h-32 p-4 border border-indigo-200 rounded-xl bg-indigo-50/30 overflow-y-auto hidden text-slate-700 leading-relaxed">
                        <!-- Highlighted text goes here -->
                    </div>

                    <div class="flex justify-between items-center mt-4">
                        <button id="backToEditBtn" onclick="toggleEditMode(true)" class="text-xs text-slate-400 hover:text-slate-600 hidden font-bold">
                            <i class="fas fa-pencil-alt mr-1"></i> 返回继续编辑
                        </button>
                        <div class="flex-grow"></div>
                        <button onclick="addToCurrentPlaylist()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-lg font-bold transition-all shadow-md active:scale-95">
                            解析并添加
                        </button>
                    </div>
                </section>

                <!-- Current Playlist Detail -->
                <section class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
                    <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h2 class="font-semibold text-slate-700 tracking-tight">列表详情 (<span id="itemCount">0</span>)</h2>
                        <div class="flex gap-4 items-center">
                            <button onclick="clearCurrentItems()" class="text-xs text-red-400 hover:text-red-600 transition-colors font-bold">清空当前列表</button>
                        </div>
                    </div>
                    <div id="itemsContainer" class="max-h-[500px] overflow-y-auto">
                        <!-- Items list -->
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Bottom Player Bar -->
    <div class="fixed bottom-0 left-0 right-0 glass-morphism border-t border-slate-200 p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-50">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center gap-6">
            
            <div class="hidden md:flex items-center gap-4 w-1/4">
                <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 text-xl">
                    <i class="fas fa-volume-up"></i>
                </div>
                <div class="flex-grow min-w-0">
                    <p id="currentText" class="text-slate-800 font-bold truncate text-lg tracking-tight">就绪</p>
                    <p id="currentListInfo" class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">选择列表开始</p>
                </div>
            </div>

            <div class="flex flex-col items-center gap-3 flex-grow">
                <div class="flex items-center gap-6 sm:gap-8">
                    <button id="shuffleBtn" onclick="toggleShuffle()" class="text-slate-300 hover:text-blue-600 transition-colors" title="随机播放">
                        <i class="fas fa-random text-xl"></i>
                    </button>
                    <button onclick="prevTrack()" class="text-slate-400 hover:text-blue-600 transition-colors"><i class="fas fa-step-backward text-2xl"></i></button>
                    <button id="playBtn" onclick="togglePlay()" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all active:scale-90">
                        <i id="playIcon" class="fas fa-play text-xl ml-1"></i>
                    </button>
                    <button onclick="nextTrack()" class="text-slate-400 hover:text-blue-600 transition-colors"><i class="fas fa-step-forward text-2xl"></i></button>
                    <button id="repeatBtn" onclick="toggleRepeat()" class="text-slate-300 hover:text-blue-600 transition-colors" title="循环模式">
                        <i class="fas fa-redo text-xl"></i>
                    </button>
                </div>
                <div id="progressInfo" class="text-[10px] text-slate-400 font-mono font-bold uppercase tracking-widest">Idle</div>
            </div>

            <div class="flex flex-col gap-2 w-full md:w-1/4">
                <div class="flex items-center gap-2 bg-slate-100/50 p-2 rounded-lg border border-slate-100">
                    <i class="fas fa-user-tie text-slate-400 text-xs"></i>
                    <select id="voiceSelect" class="bg-transparent text-xs font-bold text-slate-600 outline-none w-full">
                        <option>加载语音中...</option>
                    </select>
                </div>
                <div class="flex items-center gap-3 px-2">
                    <i class="fas fa-tachometer-alt text-slate-300 text-xs"></i>
                    <input id="rateRange" type="range" min="0.5" max="2" step="0.1" value="1" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" onchange="updateRateLabel(this.value)">
                    <span id="rateLabel" class="text-[10px] font-black text-slate-500 min-w-[30px]">1.0x</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl scale-95 transition-all duration-200">
            <h3 id="modalTitle" class="text-xl font-black mb-2 text-slate-800 tracking-tight">标题</h3>
            <p id="modalDescription" class="text-sm text-slate-500 mb-6 hidden font-medium">内容</p>
            <input id="modalInput" type="text" class="w-full p-4 border border-slate-200 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-blue-500 hidden font-semibold">
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="px-5 py-2 text-slate-400 font-bold hover:text-slate-600 transition-colors">取消</button>
                <button id="modalConfirm" class="px-8 py-2 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-95">确认</button>
            </div>
        </div>
    </div>

    <!-- Suggestions Popover -->
    <div id="suggestionPopover" class="fixed hidden z-[150] bg-white border border-slate-200 rounded-2xl shadow-2xl p-3 min-w-[160px] animate-in fade-in zoom-in duration-200">
        <div class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-2 px-2">AI 建议修正</div>
        <div id="suggestionList" class="flex flex-col gap-1">
            <!-- Suggestions injected here -->
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        async function callGemini(prompt, systemPrompt, useJson = false) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: useJson ? { 
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            errors: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        word: { type: "STRING" },
                                        suggestions: { type: "ARRAY", items: { type: "STRING" } }
                                    }
                                }
                            }
                        }
                    }
                } : undefined
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    return result.candidates[0].content.parts[0].text;
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            throw new Error("Gemini API Error");
        }

        let data = JSON.parse(localStorage.getItem('echo_v3_data')) || {
            currentListName: '默认列表',
            playlists: { '默认列表': [] }
        };
        
        let inputErrors = []; 
        let currentIndex = -1;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 'list';
        let shuffleQueue = [];
        
        const synth = window.speechSynthesis;
        let voices = [];
        let selectedVoiceName = localStorage.getItem('echo_v2_voice') || '';

        window.onload = () => {
            initVoices();
            renderPlaylistNames();
            renderCurrentItems();
            updateControls();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = initVoices;
            }
            window.addEventListener('click', (e) => {
                if (!e.target.closest('.spell-error') && !e.target.closest('#suggestionPopover')) {
                    document.getElementById('suggestionPopover').classList.add('hidden');
                }
            });
        };

        function initVoices() {
            voices = synth.getVoices();
            const select = document.getElementById('voiceSelect');
            if (!select) return;
            select.innerHTML = '';
            
            // 精简：只保留美式英语
            const usVoices = voices.filter(voice => voice.lang.includes('en-US') || voice.lang.includes('en_US'));
            const sortedVoices = usVoices.sort((a, b) => (a.name.includes('Online') && !b.name.includes('Online')) ? -1 : 0);
            
            if (sortedVoices.length === 0) {
                const option = document.createElement('option');
                option.textContent = "未找到美式英语语音";
                select.appendChild(option);
                return;
            }

            sortedVoices.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                if (voice.name === selectedVoiceName) option.selected = true;
                select.appendChild(option);
            });

            select.onchange = () => {
                selectedVoiceName = select.value;
                localStorage.setItem('echo_v2_voice', selectedVoiceName);
            };
        }

        function saveData() { localStorage.setItem('echo_v3_data', JSON.stringify(data)); }

        async function runInputSpellingCheck() {
            const inputVal = document.getElementById('rawInput').value;
            if (!inputVal.trim()) return;

            const btn = document.getElementById('aiInputCheckBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> AI 正在分析...`;
            btn.disabled = true;

            try {
                const prompt = `Identify spelling and grammar errors in: "${inputVal}".`;
                const systemPrompt = "Proofread English. Identify errors and provide suggestions in the requested JSON format.";
                
                const responseText = await callGemini(prompt, systemPrompt, true);
                const result = JSON.parse(responseText);
                inputErrors = result.errors || [];
                
                toggleEditMode(false); 
                renderProofreaderView(inputVal);
                showToast(inputErrors.length > 0 ? `发现 ${inputErrors.length} 处拼写建议` : "✨ 拼写完美！");
            } catch (e) {
                console.error(e);
                showToast("校对请求失败");
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        function toggleEditMode(isEditing) {
            const textarea = document.getElementById('rawInput');
            const proofView = document.getElementById('proofreaderView');
            const backBtn = document.getElementById('backToEditBtn');
            const checkBtn = document.getElementById('aiInputCheckBtn');

            if (isEditing) {
                textarea.classList.remove('hidden');
                proofView.classList.add('hidden');
                backBtn.classList.add('hidden');
                checkBtn.classList.remove('hidden');
            } else {
                textarea.classList.add('hidden');
                proofView.classList.remove('hidden');
                backBtn.classList.remove('hidden');
                checkBtn.classList.add('hidden');
            }
        }

        function renderProofreaderView(text) {
            const container = document.getElementById('proofreaderView');
            let html = text;
            inputErrors.forEach(err => {
                const regex = new RegExp(`\\b${err.word}\\b`, 'gi');
                html = html.replace(regex, `<span class="spell-error" onclick="showInputSuggestions(event, '${err.word}')">${err.word}</span>`);
            });
            container.innerHTML = html;
        }

        function showInputSuggestions(event, word) {
            const popover = document.getElementById('suggestionPopover');
            const list = document.getElementById('suggestionList');
            const error = inputErrors.find(e => e.word.toLowerCase() === word.toLowerCase());
            if (!error) return;

            list.innerHTML = error.suggestions.map(s => `
                <button onclick="applyInputCorrection('${word}', '${s}')" class="text-left px-4 py-2 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-colors font-bold">
                    ${s}
                </button>
            `).join('');

            popover.classList.remove('hidden');
            const rect = event.target.getBoundingClientRect();
            popover.style.top = `${rect.bottom + window.scrollY + 8}px`;
            popover.style.left = `${rect.left + window.scrollX}px`;
        }

        function applyInputCorrection(original, corrected) {
            const textarea = document.getElementById('rawInput');
            const regex = new RegExp(`\\b${original}\\b`, 'gi');
            textarea.value = textarea.value.replace(regex, corrected);
            inputErrors = inputErrors.filter(e => e.word.toLowerCase() !== original.toLowerCase());
            renderProofreaderView(textarea.value);
            document.getElementById('suggestionPopover').classList.add('hidden');
            if (inputErrors.length === 0) setTimeout(() => toggleEditMode(true), 600);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white px-6 py-2 rounded-full text-[11px] font-black z-[300] shadow-2xl backdrop-blur-md uppercase tracking-widest";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        let modalCallback = null;
        function showModal({ title, description, inputPlaceholder, isConfirmOnly, onConfirm }) {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('modalTitle').innerText = title;
            const desc = document.getElementById('modalDescription');
            const input = document.getElementById('modalInput');
            const confirmBtn = document.getElementById('modalConfirm');

            if (description) { desc.innerText = description; desc.classList.remove('hidden'); }
            else desc.classList.add('hidden');

            if (!isConfirmOnly) { input.classList.remove('hidden'); input.placeholder = inputPlaceholder || ''; input.value = ''; }
            else input.classList.add('hidden');

            confirmBtn.className = (title.includes('删除') || title.includes('清空')) ? 
                "px-8 py-2 bg-red-500 text-white rounded-2xl font-black hover:bg-red-600 active:scale-95 transition-all" : 
                "px-8 py-2 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 active:scale-95 transition-all";

            overlay.classList.remove('hidden');
            modalCallback = onConfirm;
            if (!isConfirmOnly) setTimeout(() => input.focus(), 100);
        }

        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
        document.getElementById('modalConfirm').onclick = () => { if (modalCallback) modalCallback(document.getElementById('modalInput').value); closeModal(); };

        function renderPlaylistNames() {
            const container = document.getElementById('playlistNames');
            if (!container) return;
            container.innerHTML = Object.keys(data.playlists).map(name => `
                <li class="flex items-center justify-between group p-2 rounded-xl cursor-pointer ${name === data.currentListName ? 'bg-indigo-50 text-indigo-600 font-bold shadow-sm shadow-indigo-100/50' : 'text-slate-500 hover:bg-slate-50'}" 
                    onclick="switchPlaylist('${name}')">
                    <div class="flex items-center gap-3 truncate">
                        <i class="fas fa-folder-open text-sm opacity-40"></i>
                        <span class="truncate">${name}</span>
                    </div>
                    ${name !== '默认列表' ? `<button onclick="event.stopPropagation(); deletePlaylist('${name}')" class="opacity-0 group-hover:opacity-100 p-1 text-slate-300 hover:text-red-500 transition-all"><i class="fas fa-times text-xs"></i></button>` : ''}
                </li>
            `).join('');

            const targetEl = document.getElementById('targetListName');
            const infoEl = document.getElementById('currentListInfo');
            if (targetEl) targetEl.innerText = data.currentListName;
            if (infoEl) infoEl.innerText = data.currentListName;
        }

        function switchPlaylist(name) {
            stopPlayback();
            data.currentListName = name;
            currentIndex = -1;
            shuffleQueue = [];
            saveData();
            renderPlaylistNames();
            renderCurrentItems();
            toggleEditMode(true);
        }

        function createNewPlaylist() {
            showModal({ title: '创建新列表', inputPlaceholder: '名称...', onConfirm: (v) => {
                const n = v.trim(); if (!n || data.playlists[n]) return;
                data.playlists[n] = []; saveData(); switchPlaylist(n);
            }});
        }

        function deletePlaylist(name) {
            showModal({ title: '确认删除', description: `删除 "${name}" 将无法恢复。`, isConfirmOnly: true, onConfirm: () => {
                delete data.playlists[name]; if (data.currentListName === name) data.currentListName = '默认列表';
                saveData(); renderPlaylistNames(); renderCurrentItems();
            }});
        }

        function addToCurrentPlaylist() {
            const textarea = document.getElementById('rawInput');
            const input = textarea.value;
            if (!input.trim()) return;
            const lines = input.split(/[\n;，,]/).map(i => i.trim()).filter(i => i.length > 0);
            data.playlists[data.currentListName].push(...lines);
            textarea.value = '';
            shuffleQueue = [];
            toggleEditMode(true);
            saveData();
            renderCurrentItems();
        }

        function renderCurrentItems() {
            const list = data.playlists[data.currentListName];
            const container = document.getElementById('itemsContainer');
            if (!container) return;
            const countEl = document.getElementById('itemCount');
            if (countEl) countEl.innerText = list.length;

            if (list.length === 0) {
                container.innerHTML = `<div class="p-16 text-center text-slate-300 italic flex flex-col items-center"><i class="fas fa-box-open text-4xl mb-4 opacity-10"></i>列表还没有内容</div>`;
                return;
            }
            container.innerHTML = list.map((text, idx) => `
                <div class="flex items-center p-4 border-b border-slate-50 transition-all cursor-pointer group ${idx === currentIndex ? 'active-item shadow-sm' : 'hover:bg-slate-50/50'}" 
                     onclick="playSpecific(${idx})">
                    <div class="mr-4 text-[10px] font-black text-slate-200 w-5 text-center">${idx + 1}</div>
                    <div class="flex-grow text-slate-700 text-sm font-semibold pr-4 leading-relaxed">${text}</div>
                    <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                         <button onclick="event.stopPropagation(); moveItem(${idx}, -1)" class="p-1 text-slate-300 hover:text-blue-500"><i class="fas fa-chevron-up text-xs"></i></button>
                         <button onclick="event.stopPropagation(); removeItem(${idx})" class="p-1 text-slate-300 hover:text-red-400"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function removeItem(idx) {
            data.playlists[data.currentListName].splice(idx, 1);
            if (currentIndex === idx) stopPlayback(); else if (currentIndex > idx) currentIndex--;
            shuffleQueue = []; saveData(); renderCurrentItems();
        }

        function moveItem(idx, dir) {
            const list = data.playlists[data.currentListName];
            if ((idx === 0 && dir === -1) || (idx === list.length - 1 && dir === 1)) return;
            [list[idx], list[idx + dir]] = [list[idx + dir], list[idx]];
            if (currentIndex === idx) currentIndex += dir; else if (currentIndex === idx + dir) currentIndex -= dir;
            saveData(); renderCurrentItems();
        }

        function clearCurrentItems() {
            showModal({ title: '清空列表', description: '是否清空当前列表所有条目？', isConfirmOnly: true, onConfirm: () => {
                data.playlists[data.currentListName] = []; stopPlayback(); saveData(); renderCurrentItems();
            }});
        }

        function playSpecific(index) {
            const list = data.playlists[data.currentListName];
            if (!list || list.length === 0) return;
            currentIndex = index; renderCurrentItems();
            const text = list[currentIndex];
            const textEl = document.getElementById('currentText');
            const infoEl = document.getElementById('progressInfo');
            if (textEl) textEl.innerText = text;
            if (infoEl) infoEl.innerText = `${currentIndex + 1} / ${list.length}`;
            speak(text);
            const active = document.querySelector('.active-item');
            if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function speak(text) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const v = voices.find(v => v.name === selectedVoiceName);
            if (v) u.voice = v;
            u.lang = 'en-US';
            u.rate = parseFloat(document.getElementById('rateRange').value);
            u.onstart = () => { isPlaying = true; updateControls(); };
            u.onend = () => { if (isPlaying) handleTrackEnd(); };
            synth.speak(u);
        }

        function handleTrackEnd() { if (repeatMode === 'single') playSpecific(currentIndex); else nextTrack(); }

        function nextTrack() {
            const list = data.playlists[data.currentListName]; if (list.length === 0) return;
            if (isShuffle) {
                if (shuffleQueue.length === 0) {
                    shuffleQueue = [...Array(list.length).keys()];
                    for (let i = shuffleQueue.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffleQueue[i], shuffleQueue[j]] = [shuffleQueue[j], shuffleQueue[i]];
                    }
                    if (shuffleQueue[0] === currentIndex && shuffleQueue.length > 1) shuffleQueue.push(shuffleQueue.shift());
                }
                playSpecific(shuffleQueue.shift());
            } else playSpecific((currentIndex + 1) % list.length);
        }

        function prevTrack() {
            const list = data.playlists[data.currentListName]; if (list.length === 0) return;
            currentIndex = (currentIndex - 1 + list.length) % list.length; playSpecific(currentIndex);
        }

        function togglePlay() { if (isPlaying) stopPlayback(); else { if (currentIndex === -1) currentIndex = 0; playSpecific(currentIndex); } }
        function stopPlayback() { isPlaying = false; synth.cancel(); updateControls(); }

        function updateControls() {
            const iconEl = document.getElementById('playIcon');
            const shuffleEl = document.getElementById('shuffleBtn');
            const rBtn = document.getElementById('repeatBtn');
            if (iconEl) iconEl.className = isPlaying ? "fas fa-pause text-xl" : "fas fa-play text-xl ml-1";
            if (shuffleEl) shuffleEl.className = isShuffle ? "text-blue-600" : "text-slate-300";
            if (rBtn) {
                const rIcon = rBtn.querySelector('i');
                if (repeatMode === 'list') { rBtn.className = "text-blue-600"; if (rIcon) rIcon.className = "fas fa-redo text-xl"; }
                else { rBtn.className = "text-orange-500"; if (rIcon) rIcon.className = "fas fa-redo-alt text-xl"; }
            }
        }

        function toggleShuffle() { isShuffle = !isShuffle; shuffleQueue = []; updateControls(); }
        function toggleRepeat() { repeatMode = (repeatMode === 'list') ? 'single' : 'list'; updateControls(); }
        function updateRateLabel(v) { document.getElementById('rateLabel').innerText = v + 'x'; }

        function exportToTxt() {
            const list = data.playlists[data.currentListName]; if (list.length === 0) return;
            const blob = new Blob([list.join('\n')], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${data.currentListName}_Export.txt`; a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
